name: Update GOBL

on:
  workflow_dispatch:
    inputs:
      version:
        description: "GOBL version to update to (e.g. v0.401.0). Leave blank for latest."
        required: false
        default: ""

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"

      - name: Resolve version
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            VERSION="$INPUT_VERSION"
          else
            VERSION=$(gh release view --repo invopop/gobl --json tagName -q .tagName)
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION"

      - name: Update GOBL dependency
        run: |
          go get github.com/invopop/gobl@${{ steps.version.outputs.version }}
          go mod tidy

      - name: Verify build
        run: go build ./...

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          title: "Update GOBL to ${{ steps.version.outputs.version }}"
          body: |
            Manual update triggered via workflow_dispatch.

            **Version:** `${{ steps.version.outputs.version }}`
          branch: "deps/gobl-${{ steps.version.outputs.version }}"
          commit-message: "Update GOBL to ${{ steps.version.outputs.version }}"
